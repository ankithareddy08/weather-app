<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Weather Dashboard</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#137fec',
            surface: '#f8fafc',
            card: '#ffffff',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-layout-and-animations">
    /* Background Gradient */
    body {
      background: linear-gradient(135deg, #e0f2fe 0%, #f8fafc 100%);
      min-height: 100vh;
    }

    /* Glass Morphism Effect */
    .glass-effect {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    /* Hide Scrollbar */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes pulse-subtle {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    /* Animation utility classes */
    .animate-fade-in-down {
      animation: fadeInDown 0.6s ease-out forwards;
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .animate-slide-in-left {
      animation: slideInLeft 0.6s ease-out forwards;
    }

    .animate-slide-in-right {
      animation: slideInRight 0.6s ease-out forwards;
    }

    .animate-scale-in {
      animation: scaleIn 0.4s ease-out forwards;
    }

    .animate-pulse-subtle {
      animation: pulse-subtle 2s ease-in-out infinite;
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    /* Card hover effects */
    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
    }

    /* Input focus animations */
    input, select {
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      transform: scale(1.02);
    }

    /* Button animations */
    button {
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    /* Loading spinner */
    .spinner {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    /* Stagger animation for list items */
    .stagger-item {
      opacity: 0;
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .stagger-item:nth-child(1) { animation-delay: 0.1s; }
    .stagger-item:nth-child(2) { animation-delay: 0.2s; }
    .stagger-item:nth-child(3) { animation-delay: 0.3s; }
    .stagger-item:nth-child(4) { animation-delay: 0.4s; }
    .stagger-item:nth-child(5) { animation-delay: 0.5s; }
    .stagger-item:nth-child(6) { animation-delay: 0.6s; }
    .stagger-item:nth-child(7) { animation-delay: 0.7s; }
    .stagger-item:nth-child(8) { animation-delay: 0.8s; }

  </style>
</head>
<body class="font-sans text-slate-800">
<div class="max-w-6xl mx-auto p-4 md:p-8">

<!-- Page Title -->
<div class="mb-8 animate-fade-in-down">
  <h1 class="text-4xl md:text-5xl font-bold text-slate-900 tracking-tight">🌤️ Weather Dashboard</h1>
  <p class="text-slate-600 mt-2">Real-time weather updates for any location</p>
</div>

<!-- BEGIN: MainHeader -->
<header class="animate-fade-in-down" style="animation-delay: 0.1s;">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-12">
    
    <!-- Location Search -->
    <div class="md:col-span-2">
      <label class="block text-sm font-semibold text-slate-700 mb-2"><img src="Assets/map-pin.png" alt="location" class="inline w-5 h-5 mr-1" style="vertical-align: middle;" /> Location</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
          </svg>
        </div>
        <input 
          id="location-input"
          type="text" 
          placeholder="Search city or coordinates..." 
          class="w-full bg-white border border-slate-200 rounded-custom py-3 pl-12 pr-4 shadow-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
        />
      </div>
      <div id="location-suggestions" class="absolute mt-1 w-full bg-white border border-slate-200 rounded-custom shadow-lg hidden max-h-48 overflow-y-auto z-10"></div>
    </div>

    <!-- Date & Time Display -->
    <div class="glass-effect px-4 py-3 rounded-custom shadow-sm border border-slate-100 animate-slide-in-right">
      <div class="font-semibold text-slate-600 text-sm" id="current-date">Loading...</div>
      <div class="text-sm text-slate-400" id="current-time">Loading...</div>
    </div>

  </div>

  <!-- Date & Time Pickers -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8 animate-fade-in-up" style="animation-delay: 0.2s;">
    
    <!-- Date Picker -->
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2"><img src="Assets/calendar.png" alt="date" class="inline w-5 h-5 mr-1" style="vertical-align: middle;" /> Date</label>
      <input 
        id="date-picker"
        type="date" 
        class="w-full bg-white border border-slate-200 rounded-custom py-2 px-3 shadow-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
      />
    </div>

    <!-- Time Picker -->
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2"><img src="Assets/clock-8.png" alt="time" class="inline w-5 h-5 mr-1" style="vertical-align: middle;" /> Time</label>
      <input 
        id="time-picker"
        type="time" 
        class="w-full bg-white border border-slate-200 rounded-custom py-2 px-3 shadow-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
      />
    </div>

    <!-- Update Button -->
    <div class="flex items-end">
      <button 
        id="update-weather-btn"
        class="w-full bg-primary text-white font-semibold py-2 px-4 rounded-custom shadow-md hover:bg-blue-700 transition-all card-hover active:shadow-sm"
      >
        🔄 Update
      </button>
    </div>

  </div>
</header>
<!-- END: MainHeader -->

<main class="space-y-12">
<!-- BEGIN: HeroSection -->
<section class="text-center space-y-6 animate-scale-in" style="animation-delay: 0.3s;" data-purpose="current-weather">
  <div class="space-y-4">
    <div class="text-7xl sm:text-8xl font-bold text-slate-900 tracking-tighter animate-float" id="temp-display">
      <span id="current-temp">--</span>°C
    </div>
    <div class="flex items-center justify-center gap-3">
      <!-- Weather Icon -->
      <svg id="weather-icon" class="w-14 h-14 text-slate-500 animate-float" style="animation-delay: 0.1s;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
      </svg>
      <span id="weather-condition" class="text-2xl sm:text-3xl font-medium text-slate-600">Cloudy</span>
    </div>
    <p id="location-display" class="text-sm sm:text-base text-slate-500 font-medium"><img src="Assets/map-pin.png" alt="location" class="inline w-4 h-4 mr-1" style="vertical-align: middle;" /> Not selected</p>
  </div>

  <!-- Key Weather Metrics -->
  <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 sm:gap-6 mt-8">
    <!-- Humidity -->
    <div class="bg-white p-4 sm:p-6 rounded-custom shadow-sm border border-slate-100 card-hover stagger-item">
      <svg class="w-6 h-6 text-blue-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M19 14l-7 7m0 0l-7-7m7 7V3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
      </svg>
      <p class="text-xs uppercase tracking-wider font-bold text-slate-500">Humidity</p>
      <p id="humidity-display" class="text-2xl font-bold text-slate-800">--</p>
    </div>

    <!-- Wind Speed -->
    <div class="bg-white p-4 sm:p-6 rounded-custom shadow-sm border border-slate-100 card-hover stagger-item">
      <svg class="w-6 h-6 text-blue-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
      </svg>
      <p class="text-xs uppercase tracking-wider font-bold text-slate-500">Wind Speed</p>
      <p id="wind-display" class="text-2xl font-bold text-slate-800">--</p>
    </div>

    <!-- Feels Like -->
    <div class="bg-white p-4 sm:p-6 rounded-custom shadow-sm border border-slate-100 card-hover stagger-item">
      <svg class="w-6 h-6 text-blue-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
      </svg>
      <p class="text-xs uppercase tracking-wider font-bold text-slate-500">Feels Like</p>
      <p id="feels-like-display" class="text-2xl font-bold text-slate-800">--</p>
    </div>
  </div>
</section>
<!-- END: HeroSection -->
<!-- BEGIN: HourlyForecast -->
<section data-purpose="hourly-section" class="animate-fade-in-up" style="animation-delay: 0.4s;">
  <h2 class="text-xl font-bold mb-4 text-slate-800 px-1"><img src="Assets/clock-8.png" alt="hourly" class="inline w-5 h-5 mr-1" style="vertical-align: middle;" /> Hourly Forecast</h2>
  <div class="flex overflow-x-auto gap-4 pb-4 hide-scrollbar">
    <!-- Hourly Cards Container -->
    <div id="hourly-container" class="flex gap-4">
      <!-- Cards will be generated here by JavaScript -->
      <div class="flex-shrink-0 w-24 bg-white p-4 rounded-custom shadow-sm border border-slate-100 flex flex-col items-center gap-2 animate-pulse-subtle">
        <span class="text-sm font-medium text-slate-500">--:--</span>
        <div class="w-8 h-8 bg-slate-200 rounded"></div>
        <span class="font-bold text-lg text-slate-300">--°</span>
      </div>
    </div>
  </div>
</section>
<!-- END: HourlyForecast -->
<!-- BEGIN: DailyForecast -->
<section data-purpose="daily-section" class="animate-fade-in-up" style="animation-delay: 0.5s;">
  <h2 class="text-xl font-bold mb-4 text-slate-800 px-1"><img src="Assets/calendar-days.png" alt="weekly" class="inline w-5 h-5 mr-1" style="vertical-align: middle;" /> Weekly Forecast</h2>
  <div id="daily-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-7 gap-3 sm:gap-4">
    <!-- Daily cards will be generated here by JavaScript -->
    <div class="bg-white p-3 sm:p-4 rounded-custom shadow-sm border border-slate-100 flex flex-col items-center gap-1 sm:gap-2 animate-pulse-subtle">
      <span class="text-xs sm:text-sm font-semibold text-slate-500 uppercase">--</span>
      <div class="w-8 h-8 bg-slate-200 rounded"></div>
      <span class="text-lg sm:text-2xl font-bold text-slate-300">--°</span>
      <span class="text-xs text-slate-400">--</span>
    </div>
  </div>
</section>
<!-- END: DailyForecast -->
</main>
<footer class="mt-20 pt-8 border-t border-slate-200 text-center text-slate-400 text-sm">
  <p>© 2024 SkyCast Weather. Powered by Open Meteo API.</p>
</footer>
</div>

<!-- JavaScript -->
<script data-purpose="weather-app-logic">
  // ==================== CONFIG ====================
  const API_BASE = 'https://api.open-meteo.com/v1';
  const GEOCODING_API = 'https://geocoding-api.open-meteo.com/v1/search';

  // Weather code to condition & emoji mapping
  const weatherCodes = {
    0: { text: 'Clear', emoji: '☀️', icon: 'sun' },
    1: { text: 'Mostly Clear', emoji: '🌤️', icon: 'sun' },
    2: { text: 'Partly Cloudy', emoji: '⛅', icon: 'cloud' },
    3: { text: 'Overcast', emoji: '☁️', icon: 'cloud' },
    45: { text: 'Foggy', emoji: '🌫️', icon: 'cloud' },
    48: { text: 'Foggy/Rime', emoji: '🌫️', icon: 'cloud' },
    51: { text: 'Light Drizzle', emoji: '🌦️', icon: 'rain' },
    53: { text: 'Drizzle', emoji: '🌦️', icon: 'rain' },
    55: { text: 'Heavy Drizzle', emoji: '🌧️', icon: 'rain' },
    61: { text: 'Light Rain', emoji: '🌧️', icon: 'rain' },
    63: { text: 'Rain', emoji: '🌧️', icon: 'rain' },
    65: { text: 'Heavy Rain', emoji: '⛈️', icon: 'rain' },
    71: { text: 'Light Snow', emoji: '🌨️', icon: 'snow' },
    73: { text: 'Snow', emoji: '❄️', icon: 'snow' },
    75: { text: 'Heavy Snow', emoji: '❄️', icon: 'snow' },
    80: { text: 'Light Rain Showers', emoji: '🌦️', icon: 'rain' },
    81: { text: 'Rain Showers', emoji: '🌧️', icon: 'rain' },
    82: { text: 'Heavy Rain Showers', emoji: '⛈️', icon: 'rain' },
    85: { text: 'Light Snow Showers', emoji: '🌨️', icon: 'snow' },
    86: { text: 'Snow Showers', emoji: '❄️', icon: 'snow' },
    95: { text: 'Thunderstorm', emoji: '⛈️', icon: 'storm' },
  };

  // ==================== STATE ====================
  let appState = {
    latitude: null,
    longitude: null,
    locationName: 'Not selected',
    selectedDate: new Date().toISOString().split('T')[0],
    selectedTime: new Date().toTimeString().slice(0, 5),
    weatherData: null,
  };

  // ==================== DOM ELEMENTS ====================
  const locationInput = document.getElementById('location-input');
  const locationSuggestions = document.getElementById('location-suggestions');
  const datePicker = document.getElementById('date-picker');
  const timePicker = document.getElementById('time-picker');
  const updateBtn = document.getElementById('update-weather-btn');

  // ==================== DATE & TIME FUNCTIONS ====================
  function updateDateTime() {
    const now = new Date();
    const dateOptions = { year: 'numeric', month: 'long', day: 'numeric' };
    const timeOptions = { hour: '2-digit', minute: '2-digit' };
    
    document.getElementById('current-date').textContent = now.toLocaleDateString('en-US', dateOptions);
    document.getElementById('current-time').textContent = now.toLocaleTimeString('en-US', timeOptions);
  }

  // Initialize date/time pickers with current values
  function initDateTimePickers() {
    const now = new Date();
    datePicker.value = now.toISOString().split('T')[0];
    timePicker.value = now.toTimeString().slice(0, 5);
    appState.selectedDate = datePicker.value;
    appState.selectedTime = timePicker.value;
  }

  // ==================== LOCATION SEARCH ====================
  async function searchLocations(query) {
    if (query.length < 2) {
      locationSuggestions.classList.add('hidden');
      return;
    }

    try {
      const response = await fetch(`${GEOCODING_API}?name=${encodeURIComponent(query)}&count=10&language=en`);
      const data = await response.json();

      if (data.results && data.results.length > 0) {
        displayLocationSuggestions(data.results);
      } else {
        locationSuggestions.innerHTML = '<div class="p-4 text-slate-500">No locations found</div>';
        locationSuggestions.classList.remove('hidden');
      }
    } catch (error) {
      console.error('Error searching locations:', error);
      locationSuggestions.innerHTML = '<div class="p-4 text-red-500">Error searching locations</div>';
      locationSuggestions.classList.remove('hidden');
    }
  }

  function displayLocationSuggestions(results) {
    locationSuggestions.innerHTML = results.map(location => `
      <div class="px-4 py-3 border-b border-slate-200 cursor-pointer hover:bg-slate-50 transition-colors" 
           onclick="selectLocation(${location.latitude}, ${location.longitude}, '${location.name}${location.admin1 ? ', ' + location.admin1 : ''}${location.country ? ', ' + location.country : ''}')">
        <div class="font-semibold text-slate-800">${location.name}</div>
        <div class="text-xs text-slate-500">${location.admin1 || ''} ${location.country || ''}</div>
      </div>
    `).join('');
    locationSuggestions.classList.remove('hidden');
  }

  function selectLocation(lat, lon, name) {
    appState.latitude = lat;
    appState.longitude = lon;
    appState.locationName = name;
    locationInput.value = name;
    locationSuggestions.classList.add('hidden');
    document.getElementById('location-display').innerHTML = `<img src="Assets/map-pin.png" alt="location" class="inline w-4 h-4 mr-1" style="vertical-align: middle;" /> ${name}`;
    
    // Automatically fetch weather data when location is selected
    fetchWeatherData();
  }

  // ==================== WEATHER API ====================
  async function fetchWeatherData() {
    if (!appState.latitude || !appState.longitude) {
      alert('Please select a location first');
      return;
    }

    updateBtn.disabled = true;
    updateBtn.innerHTML = '<span class="spinner inline-block mr-2">⟳</span>Loading...';

    try {
      const params = new URLSearchParams({
        latitude: appState.latitude,
        longitude: appState.longitude,
        current: 'temperature_2m,relative_humidity_2m,weather_code,apparent_temperature,wind_speed_10m',
        hourly: 'temperature_2m,weather_code',
        daily: 'weather_code,temperature_2m_max,temperature_2m_min',
        timezone: 'auto',
      });

      const response = await fetch(`${API_BASE}/forecast?${params}`);
      const data = await response.json();

      appState.weatherData = data;
      updateWeatherDisplay(data);
      generateHourlyForecast(data);
      generateDailyForecast(data);
      
    } catch (error) {
      console.error('Error fetching weather:', error);
      alert('Error fetching weather data. Please try again.');
    } finally {
      updateBtn.disabled = false;
      updateBtn.innerHTML = '🔄 Update';
    }
  }

  function updateWeatherDisplay(data) {
    const current = data.current;
    const weatherInfo = weatherCodes[current.weather_code] || { text: 'Unknown', emoji: '❓' };

    document.getElementById('current-temp').textContent = Math.round(current.temperature_2m);
    document.getElementById('weather-condition').textContent = weatherInfo.text;
    document.getElementById('humidity-display').textContent = `${current.relative_humidity_2m}%`;
    document.getElementById('wind-display').textContent = `${Math.round(current.wind_speed_10m)} km/h`;
    document.getElementById('feels-like-display').textContent = `${Math.round(current.apparent_temperature)}°`;
  }

  function generateHourlyForecast(data) {
    const hourly = data.hourly;
    const times = hourly.time;
    const temperatures = hourly.temperature_2m;
    const weatherCodes_ = hourly.weather_code;

    // Get next 24 hours
    const now = new Date();
    const container = document.getElementById('hourly-container');
    container.innerHTML = '';

    for (let i = 0; i < 24 && i < times.length; i++) {
      const time = new Date(times[i]);
      const temp = Math.round(temperatures[i]);
      const code = weatherCodes_[i];
      const weatherInfo = weatherCodes[code] || { text: 'Unknown', emoji: '❓' };

      const card = document.createElement('div');
      card.className = 'flex-shrink-0 w-24 bg-white p-4 rounded-custom shadow-sm border border-slate-100 flex flex-col items-center gap-2 card-hover stagger-item';
      card.innerHTML = `
        <span class="text-sm font-medium text-slate-500">${time.getHours().toString().padStart(2, '0')}:${time.getMinutes().toString().padStart(2, '0')}</span>
        <span class="text-2xl">${weatherInfo.emoji}</span>
        <span class="font-bold text-lg">${temp}°</span>
      `;
      container.appendChild(card);
    }
  }

  function generateDailyForecast(data) {
    const daily = data.daily;
    const dates = daily.time;
    const maxTemps = daily.temperature_2m_max;
    const weatherCodes_ = daily.weather_code;

    const container = document.getElementById('daily-container');
    container.innerHTML = '';

    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    for (let i = 0; i < dates.length && i < 7; i++) {
      const date = new Date(dates[i]);
      const dayName = dayNames[date.getDay()];
      const temp = Math.round(maxTemps[i]);
      const code = weatherCodes_[i];
      const weatherInfo = weatherCodes[code] || { text: 'Unknown', emoji: '❓' };

      const card = document.createElement('div');
      const isToday = i === 0 ? 'bg-primary text-white' : 'bg-white text-slate-800';
      card.className = `${isToday} p-3 sm:p-4 rounded-custom shadow-sm border border-slate-100 flex flex-col items-center gap-1 sm:gap-2 card-hover stagger-item`;
      card.innerHTML = `
        <span class="text-xs sm:text-sm font-semibold ${isToday ? 'opacity-90' : 'text-slate-500'} uppercase">${dayName}</span>
        <span class="text-2xl">${weatherInfo.emoji}</span>
        <span class="text-lg sm:text-2xl font-bold">${temp}°</span>
        <span class="text-xs ${isToday ? 'opacity-80' : 'text-slate-400'}">${weatherInfo.text}</span>
      `;
      container.appendChild(card);
    }
  }

  // ==================== EVENT LISTENERS ====================
  locationInput.addEventListener('input', (e) => {
    searchLocations(e.target.value);
  });

  datePicker.addEventListener('change', (e) => {
    appState.selectedDate = e.target.value;
  });

  timePicker.addEventListener('change', (e) => {
    appState.selectedTime = e.target.value;
  });

  updateBtn.addEventListener('click', fetchWeatherData);

  // ==================== INITIALIZATION ====================
  updateDateTime();
  initDateTimePickers();
  setInterval(updateDateTime, 60000);
